<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokopia v1.5</title>
<style>
body { margin:0; font-family:sans-serif; display:flex; }
#sidebar { width:200px; background:#222; color:white; padding:10px; overflow:auto; }
canvas { flex:1; background:green; touch-action:none; }
button { width:100%; margin-top:10px; }
</style>
</head>
<body>

<div id="sidebar">
<h3>Pokédex</h3>
<ul id="dex"></ul>
<button onclick="buildMode=true">Build Habitat</button>
<p>Materials: <span id="mat">0</span></p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth - 200;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// PLAYER (Ditto)
let dittoImg = new Image();
dittoImg.src = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/132.png";

let player = {x:100,y:100,targetX:100,targetY:100};

// GAME DATA
let materials = 0;
let resources = [];
let habitats = [];
let dex = new Set();
let buildMode = false;

const pokemonList = [
  "pikachu","bulbasaur","charmander","squirtle",
  "eevee","pidgey","rattata","zubat","oddish","meowth"
];

// 🔥 LOAD REAL SPRITES
const pokemonSprites = {};
pokemonList.forEach(name => {
  let img = new Image();
  img.src = `https://img.pokemondb.net/sprites/black-white/normal/${name}.png`;
  pokemonSprites[name] = img;
});

// SPAWN RESOURCES
function spawnResource(){
  resources.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    emoji:"🍎"
  });
}
setInterval(spawnResource, 2000);

// INPUT
canvas.addEventListener("click", e=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if(buildMode && materials>=5){
    habitats.push({
      x,y,
      pokemon: pokemonList[Math.floor(Math.random()*pokemonList.length)],
      mobs:[]
    });
    materials -=5;
    buildMode=false;
    alert("New Habitat Built!");
  } else {
    player.targetX = x;
    player.targetY = y;
  }
});

// UPDATE
function update(){
  let dx = player.targetX - player.x;
  let dy = player.targetY - player.y;
  player.x += dx*0.05;
  player.y += dy*0.05;

  // collect resources
  resources.forEach((r,i)=>{
    if(Math.hypot(player.x-r.x, player.y-r.y)<20){
      materials++;
      resources.splice(i,1);
    }
  });

  // habitats
  habitats.forEach(h=>{
    if(h.mobs.length<3){
      h.mobs.push({
        x:h.x+Math.random()*30,
        y:h.y+Math.random()*30
      });
    }

    h.mobs.forEach(m=>{
      m.x += (Math.random()-0.5)*2;
      m.y += (Math.random()-0.5)*2;
    });

    dex.add(h.pokemon);
  });

  document.getElementById("mat").innerText = materials;

  let dexList = document.getElementById("dex");
  dexList.innerHTML="";
  dex.forEach(p=>{
    let li=document.createElement("li");
    li.textContent=p;
    dexList.appendChild(li);
  });
}

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // resources
  ctx.font="20px serif";
  resources.forEach(r=> ctx.fillText(r.emoji,r.x,r.y));

  // habitats
  habitats.forEach(h=>{
    // base
    ctx.fillStyle="blue";
    ctx.fillRect(h.x,h.y,40,40);

    // big pokemon sprite
    let sprite = pokemonSprites[h.pokemon];
    if(sprite){
      ctx.drawImage(sprite, h.x, h.y-40, 40, 40);
    }

    // mobs (small pokemon)
    h.mobs.forEach(m=>{
      if(sprite){
        ctx.drawImage(sprite, m.x, m.y, 20, 20);
      }
    });
  });

  // player (Ditto)
  ctx.drawImage(dittoImg, player.x-16, player.y-16, 32,32);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
